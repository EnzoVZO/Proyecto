<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestión Tributaria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box panel">
            <h1>Iniciar Sesión</h1>
            <div id="login-error" style="color: var(--accent-red); margin-bottom: 1rem; display: none; font-size: 0.9rem;">Credenciales incorrectas</div>
            
            <div class="form-group" style="text-align: left;">
                <label>Usuario</label>
                <input type="text" id="login-username" class="form-control" placeholder="admin o corredor">
            </div>
            
            <div class="form-group" style="text-align: left; margin-bottom: 2rem;">
                <label>Contraseña</label>
                <input type="password" id="login-password" class="form-control" placeholder="123">
            </div>
            
            <button id="btn-login" class="btn btn-primary" style="width: 100%;">Ingresar</button>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnLogin = document.getElementById('btn-login');
            btnLogin.addEventListener('click', async () => {
                const user = document.getElementById('login-username').value.trim();
                const pass = document.getElementById('login-password').value;
                const err = document.getElementById('login-error');
                
                if (!user || !pass) {
                    err.innerText = 'Por favor, ingrese sus credenciales';
                    err.style.display = 'block';
                    return;
                }

                btnLogin.innerText = 'Cargando...';
                btnLogin.disabled = true;

                try {
                    const response = await fetch('https://localhost:3000/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: user, password: pass })
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        // Guardar sesion localmente para UI
                        localStorage.setItem('role', result.role);
                        localStorage.setItem('username', result.displayName);
                        // Redirigir al mantenedor
                        window.location.href = 'dashboard.html';
                    } else {
                        err.innerText = result.error || 'Acceso denegado.';
                        err.style.display = 'block';
                        btnLogin.innerText = 'Ingresar';
                        btnLogin.disabled = false;
                    }
                } catch (error) {
                    err.innerText = 'Error de red. Asegúrese de que el servidor HTTPS esté corriendo.';
                    err.style.display = 'block';
                    btnLogin.innerText = 'Ingresar';
                    btnLogin.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
