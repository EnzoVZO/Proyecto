                        <div class="form-group"><label>Factor-21: Con Derecho a Devolucion</label><div style="display: flex; gap: 0.5rem;"><input type="number" id="m21" class="form-control" value="0" step="1" style="flex: 2;"><input type="text" id="f21" class="form-control" readonly style="flex: 1; background: var(--border-color); cursor: not-allowed;"></div></div>
                        <div class="form-group"><label>Factor-22: Sin Derecho a Devolucion</label><div style="display: flex; gap: 0.5rem;"><input type="number" id="m22" class="form-control" value="0" step="1" style="flex: 2;"><input type="text" id="f22" class="form-control" readonly style="flex: 1; background: var(--border-color); cursor: not-allowed;"></div></div>
                        <div class="form-group"><label>Factor-23: Con Derecho a Devolucion</label><div style="display: flex; gap: 0.5rem;"><input type="number" id="m23" class="form-control" value="0" step="1" style="flex: 2;"><input type="text" id="f23" class="form-control" readonly style="flex: 1; background: var(--border-color); cursor: not-allowed;"></div></div>

                        <div class="form-group"><label>Factor-25: Con Derecho a Devolucion</label><div style="display: flex; gap: 0.5rem;"><input type="number" id="m25" class="form-control" value="0" step="1" style="flex: 2;"><input type="text" id="f25" class="form-control" readonly style="flex: 1; background: var(--border-color); cursor: not-allowed;"></div></div>

                </div>
                
                <div style="display: flex; gap: 0.5rem;">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initSession();
            flatpickr("input[type=date]", {
                theme: "dark",
                dateFormat: "d-m-Y"
            });
        });

        let factoresCalculadosListos = false;

        function calcularFactores() {
            const ej = document.getElementById('input-ejercicio').value;
            const mercado = document.getElementById('input-mercado').value;
            const instrumento = document.getElementById('input-nemo').value;
            const fp = document.getElementById('input-fecha').value;
            const sec = document.getElementById('input-sec').value;
            const valHist = parseFloat(document.getElementById('val-hist').value) || 0;
            const dividendo = parseFloat(document.getElementById('input-div').value) || 0;
            const isfut = document.getElementById('input-isfut').checked;
            const factorAct = parseFloat(document.getElementById('input-fact-act').value) || 0;
            const desc = document.getElementById('input-desc').value;

            if(!ej || !mercado || !instrumento || !fp || !sec) {
                showModal('Campos Incompletos', 'Campos obligatorios incompletos.', 'error');
                return;
            }
            if (parseInt(sec, 10) <= 10000) {
                showModal('Error de Regla de Negocio', 'La secuencia de evento debe ser superior a 10000.', 'error');
                return;
            }
            if(valHist === 0) {
                showModal('Valor Histórico Inválido', 'Valor histórico inválido.', 'error');
                return;
            }

            let sumFactores = 0;
            for(let i=8; i<=37; i++) {
                let m = parseFloat(document.getElementById('m'+i)?.value) || 0;
                let factor = m / valHist;
                let el = document.getElementById('f'+i);
                if(el) el.value = factor.toFixed(8);
                if(i <= 16) {
                    sumFactores += factor;
                }
            }

            if(sumFactores > 1.00000001) {
                showModal('Error de Negocio', `Suma de factores (8-16) excede 1.00.`, 'error');
                document.getElementById('calc-status').innerText = 'Error Matemático';
                document.getElementById('calc-status').style.color = 'var(--accent-red)';
                factoresCalculadosListos = false;
                document.getElementById('btn-guardar').disabled = true;
                document.getElementById('btn-guardar').style.opacity = '0.5';
            } else {
                document.getElementById('calc-status').innerText = '✓ Factores Calculados Correctamente';
                document.getElementById('calc-status').style.color = 'var(--accent-green)';
                factoresCalculadosListos = true;
                document.getElementById('btn-guardar').disabled = false;
                document.getElementById('btn-guardar').style.opacity = '1';
                showModal('Cálculo Exitoso', 'Cálculo de factores exitoso.', 'success');
            }
        }

        async function guardar() {
            if(!factoresCalculadosListos) {
                showModal('Operación Bloqueada', 'Cálculo de factores pendiente.', 'error');
                return;
            }

            const row = {
                ej: document.getElementById('input-ejercicio').value,
                mercado: document.getElementById('input-mercado').value,
                ins: document.getElementById('input-nemo').value,
                fp: document.getElementById('input-fecha').value,
                sec: document.getElementById('input-sec').value,
                desc: document.getElementById('input-desc').value,
                ori: localStorage.getItem('role') === 'admin' ? 'BOLSA' : 'CORREDOR',
                vh: document.getElementById('val-hist').value,
                dividendo: document.getElementById('input-div').value,
                isfut: document.getElementById('input-isfut').checked,
                factor_act: document.getElementById('input-fact-act').value
            };
            for(let i=8; i<=37; i++) {
                let el = document.getElementById('f'+i);
                if(el) {
                    row[`f${i}`] = parseFloat(el.value || 0);
                } else {
                    row[`f${i}`] = 0;
                }
            }

            showModal('Guardando...', 'Guardando registro...', 'info');

            const result = await grabarDatosSeguros([row]);
            
            if (result.error) {
                showModal('Error de Servidor', 'Error de conexión con el servidor.', 'error');
                return;
            }

            if(result.rechazados > 0) {
                showModal('Error de Prevalencia', 'Rechazado por regla de origen.', 'error');
            } else {
                showModal('Guardado Exitoso', 'Registro guardado exitosamente.', 'success', () => {
                    window.location.href = 'dashboard.html';
                });
            }
        }
    </script>
